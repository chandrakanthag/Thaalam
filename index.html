<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open Mic Night | Thaalam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@500&display=swap');
        
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #020617 70%),
                        radial-gradient(circle at 100% 100%, #312e81 0%, #020617 70%);
            background-attachment: fixed;
            background-color: var(--bg-dark);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Smooth Loader */
        #loader-wrapper {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }
        
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }

        .mic-icon {
            font-size: 3.5rem;
            color: #818cf8;
            animation: pulse-glow 2s infinite ease-in-out;
            will-change: transform, filter;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--primary)); }
        }

        /* Animated Background Elements */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: move 20s infinite alternate ease-in-out;
            will-change: transform;
        }
        .glow-1 { width: 100vw; height: 100vw; background: var(--primary); top: -20%; left: -20%; }
        .glow-2 { width: 80vw; height: 80vw; background: var(--secondary); top: 20%; right: -10%; animation-delay: -5s; }
        .glow-3 { width: 90vw; height: 90vw; background: var(--accent); bottom: -30%; left: 10%; animation-delay: -10s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* Glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            box-shadow: 0 8px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .shimmer-btn {
            position: relative;
            overflow: hidden;
        }

        .shimmer-btn::after {
            content: '';
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 6s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }

        .gradient-text {
            background: linear-gradient(to right, #a5b4fc, #d8b4fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Responsive Mobile Scaling */
        @media (max-width: 380px) {
            .countdown-value { font-size: 1.25rem !important; }
            .event-badge-text { font-size: 0.75rem !important; }
        }

        .floating {
            animation: floating 4s infinite ease-in-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col items-center">

    <!-- Loading Overlay -->
    <div id="loader-wrapper">
        <div class="flex flex-col items-center gap-6">
            <i class="fa-solid fa-microphone-lines mic-icon"></i>
            <p class="serif text-xl tracking-widest text-slate-300 animate-pulse">Setting the Stage</p>
        </div>
    </div>

    <!-- Background Layers -->
    <div class="bg-mesh">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>
    <div class="fixed inset-0 bg-[radial-gradient(rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:32px_32px] pointer-events-none z-[-1]"></div>

    <!-- Navigation / Header -->
    <header class="w-full max-w-lg px-6 pt-10 pb-6 flex flex-col items-center text-center">
        <!-- Logo -->
        <div class="w-28 h-28 md:w-36 md:h-36 rounded-full glass border-dashed border-white/20 p-1 mb-6 overflow-hidden floating">
            <div class="w-full h-full rounded-full bg-slate-800 flex items-center justify-center overflow-hidden">
                <img src="Logo.png" alt="Thaalam Logo" class=" object-cover" onerror="this.src='https://via.placeholder.com/150/1e1b4b/ffffff?text=THAALAM'">
            </div>
        </div>

        <h1 class="text-4xl md:text-6xl font-bold serif tracking-tight mb-4">
            Open Mic <span class="gradient-text block mt-1">Night</span>
        </h1>

        <!-- Event Badge -->
        <div class="glass px-5 py-3 rounded-2xl md:rounded-full flex flex-col md:flex-row items-center justify-center gap-2 md:gap-4 border-white/5 shadow-xl shimmer-btn w-full">
            <span class="mono text-xs md:text-sm text-indigo-300 font-medium tracking-tight">Local Sustainable Living, Maradu</span>
            <span class="hidden md:inline text-white/20">|</span>
            <div class="flex items-center gap-3">
                <span class="mono text-xs md:text-sm text-slate-200">Saturday, May 2</span>
                <span class="text-white/20">•</span>
                <span class="mono text-xs md:text-sm text-slate-200">4 PM Onwards</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-lg px-6 space-y-8 pb-12">
        
        <!-- Action Button -->
        <a href="#" target="_blank" class="btn-primary flex items-center justify-center gap-3 p-5 rounded-2xl shadow-2xl hover:scale-[1.02] active:scale-95 transition-all duration-300 shimmer-btn">
            <i class="fa-solid fa-pen-to-square text-xl"></i>
            <span class="font-bold text-lg uppercase tracking-wider">Register Now</span>
        </a>

        <!-- Countdown -->
        <div class="glass rounded-3xl p-6 border-white/10 relative overflow-hidden">
            <div id="countdown" class="grid grid-cols-4 gap-2 sm:gap-4">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full aspect-square glass rounded-xl flex items-center justify-center border-white/10">
                        <span id="days" class="text-xl sm:text-3xl font-bold mono gradient-text">00</span>
                    </div>
                    <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Days</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full aspect-square glass rounded-xl flex items-center justify-center border-white/10">
                        <span id="hours" class="text-xl sm:text-3xl font-bold mono gradient-text">00</span>
                    </div>
                    <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Hours</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full aspect-square glass rounded-xl flex items-center justify-center border-white/10">
                        <span id="minutes" class="text-xl sm:text-3xl font-bold mono gradient-text">00</span>
                    </div>
                    <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Mins</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-full aspect-square glass rounded-xl flex items-center justify-center border-indigo-500/30 ring-1 ring-indigo-500/20">
                        <span id="seconds" class="text-xl sm:text-3xl font-bold mono text-white">00</span>
                    </div>
                    <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Secs</span>
                </div>
            </div>
            <p id="event-status" class="text-center text-xs text-indigo-400 font-medium italic mt-4 hidden animate-pulse">The spotlight is on. Join us!</p>
        </div>

        <!-- Poster Card -->
        <div class="group relative rounded-3xl overflow-hidden glass p-2 border-white/5 shadow-2xl">
            <div class="aspect-[4/5] w-full rounded-2xl overflow-hidden relative">
                <img src="poster.jpeg" alt="Event Poster" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/800x1000/1e1b4b/ffffff?text=THAALAM+OPEN+MIC'">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60"></div>
            </div>
        </div>

        <!-- Location Button -->
        <a href="https://www.google.com/maps/search/?api=1&query=Local+Sustainable+Living+Maradu" target="_blank" class="glass w-full flex items-center justify-center gap-3 p-5 rounded-2xl border-white/10 hover:bg-white/5 active:scale-95 transition-all duration-300">
            <i class="fa-solid fa-location-dot text-indigo-400"></i>
            <span class="font-bold text-slate-200">Find Us on Maps</span>
        </a>
    </main>

    <!-- Footer -->
    <footer class="w-full py-12 px-6 border-t border-white/5 bg-black/40 text-center flex flex-col items-center gap-8">
        <div>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold mb-4">Stay Tuned</p>
            <a href="https://www.instagram.com/thaalam_openmic" target="_blank" class="inline-flex items-center gap-3 glass px-8 py-3 rounded-full hover:bg-gradient-to-r hover:from-pink-600/10 hover:to-purple-600/10 transition-all duration-300 group">
                <i class="fa-brands fa-instagram text-xl group-hover:text-pink-500 transition-colors"></i>
                <span class="font-bold text-sm">@thaalam_openmic</span>
            </a>
        </div>

        <div class="text-[9px] text-slate-600 uppercase tracking-[0.5em]">
            &copy; 2026 Thaalam Open Mic &bull; Kochi
        </div>
    </footer>

    <script>
        // Set target date to May 2, 2026 at 4:00 PM
        const targetDate = new Date("May 2, 2026 16:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown").classList.add("opacity-40");
                document.getElementById("event-status").classList.remove("hidden");
                ["days", "hours", "minutes", "seconds"].forEach(id => {
                    document.getElementById(id).innerText = "00";
                });
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Initialize and interval
        updateCountdown();
        const timer = setInterval(updateCountdown, 1000);

        // Responsive Loader removal
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-wrapper');
            setTimeout(() => {
                loader.classList.add('loader-hidden');
            }, 800);
        });

        // Prevention of zoom on double tap for iOS
        document.addEventListener('touchstart', (event) => {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
