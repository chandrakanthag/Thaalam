<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Mic Night</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <link rel="icon" href="Favicon_32x32.png" sizes="32x32">
    <link rel="icon" href="Favicon_32x32.png" type="image/svg+xml">
    <link rel="apple-touch-icon" href="Favicon_32x32.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            /* Improved mobile-friendly base gradient */
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #020617 50%),
                        radial-gradient(circle at 100% 100%, #312e81 0%, #020617 50%);
            background-attachment: fixed;
            background-color: #020617;
            overflow-x: hidden;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Loading Animation Styles */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        
        .mic-icon {
            font-size: 3rem;
            color: #818cf8;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.5; filter: drop-shadow(0 0 0px #6366f1); }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 20px #6366f1); }
            100% { transform: scale(1); opacity: 0.5; filter: drop-shadow(0 0 0px #6366f1); }
        }

        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* Attractive Background Elements */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.25;
            animation: pulse 10s infinite alternate ease-in-out;
        }
        .glow-1 { width: 80vw; height: 80vw; background: #6366f1; top: -20%; left: -20%; }
        .glow-2 { width: 70vw; height: 70vw; background: #a855f7; top: 20%; right: -10%; animation-delay: -3s; }
        .glow-3 { width: 90vw; height: 90vw; background: #f43f5e; bottom: -30%; left: 10%; animation-delay: -6s; }

        @keyframes pulse {
            0% { transform: scale(1) translate(0, 0); opacity: 0.2; }
            100% { transform: scale(1.1) translate(3%, 3%); opacity: 0.3; }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        /* Glass Effects */
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: none !important; /* Force remove any border */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        
        .placeholder-box {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        /* Floating Animation for Secondary Elements */
        .shimmer-btn {
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: floating-pulse 5s infinite ease-in-out;
        }

        @keyframes floating-pulse {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.02); background: rgba(30, 41, 59, 0.8); }
        }

        .gradient-text {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .badge-glass {
            background: rgba(255, 255, 255, 0.03);
            border: none;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center">

    <!-- Loading Overlay -->
    <div id="loader-wrapper">
        <div class="loader-content flex flex-col items-center gap-6">
            <i class="fa-solid fa-microphone-lines mic-icon"></i>
            <p class="serif text-xl tracking-widest opacity-50">Thaalam</p>
        </div>
    </div>

    <!-- Background Layers -->
    <div class="bg-mesh">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>
    <div class="grid-overlay"></div>

    <!-- Top Section: Logo and Title -->
    <nav class="w-full max-w-5xl px-6 pt-12 pb-8 flex flex-col items-center gap-6">
        <!-- LOGO AREA -->
        <div class="w-32 h-32 md:w-40 md:h-40 placeholder-box rounded-full mb-2 glass border-dashed overflow-hidden">
            <img src="Logo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.style.display='none';">
            <span class="text-xs font-bold uppercase tracking-widest opacity-40">Logo</span>
        </div>
        
        <div class="text-center flex flex-col items-center">
            <h1 class="text-4xl md:text-6xl font-bold serif tracking-tight leading-tight">
                Open Mic <br class="md:hidden"/> <span class="gradient-text">Night</span>
            </h1>
            
            <!-- Event Info -->
            <div class="mt-8 badge-glass px-6 py-6 md:py-4 rounded-[2rem] md:rounded-full flex flex-col md:flex-row items-center justify-center gap-2 md:gap-0 w-fit max-w-[95vw]">
                <span class="text-sm md:text-lg text-slate-200 font-medium tracking-wide text-center">Local Sustainable Living, Maradu</span>
                <span class="hidden md:inline mx-4 opacity-30 font-light text-slate-400">|</span>
                <span class="text-sm md:text-lg text-slate-200 font-medium tracking-wide text-center uppercase md:normal-case">Saturday, May 2</span>
                <span class="hidden md:inline mx-4 opacity-30 font-light text-slate-400">|</span>
                <span class="text-sm md:text-lg text-slate-200 font-medium tracking-wide text-center">9 PM Onwards</span>
            </div>
        </div>
    </nav>

    <!-- Top Quick Link (Registration) -->
    <section class="w-full max-w-2xl px-6 mb-12 flex justify-center">
        <!-- REGISTRATION LINK -->
        <a href="https://forms.google.com" target="_blank" class="w-full sm:w-3/4 btn-primary flex items-center justify-center gap-3 p-5 rounded-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all duration-200">
            <i class="fa-solid fa-pen-to-square text-xl"></i>
            <span class="font-bold text-lg">Register Now</span>
        </a>
    </section>

    <!-- Poster Section -->
    <section class="w-full max-w-2xl px-6 mb-12">
        <!-- POSTER AREA -->
        <div class="aspect-square w-full placeholder-box glass border-dashed shadow-2xl overflow-hidden relative group shimmer-btn">
            <img src="poster.jpeg" alt="Event Poster" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerHTML='<p class=\'font-bold opacity-40\'>EVENT POSTER</p>';">
            <div class="absolute inset-0 bg-gradient-to-t from-indigo-500/10 to-transparent pointer-events-none"></div>
        </div>
    </section>

    <!-- Directions Section (Moved after Poster) -->
    <section class="w-full max-w-2xl px-6 mb-20 flex justify-center">
        <!-- DIRECTIONS LINK - Get Directions, No Border, Floating Effect -->
        <a href="https://www.google.com/maps/search/?api=1&query=Local+Sustainable+Living+Maradu" target="_blank" class="w-full sm:w-3/4 glass shimmer-btn flex items-center justify-center gap-3 p-5 rounded-2xl transition-all duration-200 text-slate-200 hover:scale-[1.02] active:scale-95">
            <i class="fa-solid fa-location-arrow text-xl text-indigo-400"></i>
            <span class="font-bold text-lg">Get Directions</span>
        </a>
    </section>

    <!-- Social / Footer -->
    <footer class="w-full py-12 border-t border-white/5 bg-black/40 text-center mt-auto">
        <p class="text-slate-500 text-xs mb-6 uppercase tracking-[0.3em] font-semibold">Join our community</p>
        
        <!-- INSTAGRAM LINK -->
        <a href="https://www.instagram.com/thaalam_openmic?igsh=MTNvcWZmOGx3b3Js" target="_blank" class="inline-flex items-center gap-4 glass shimmer-btn px-10 py-4 rounded-full transition-all duration-300 transform hover:-translate-y-1">
            <i class="fa-brands fa-instagram text-2xl text-pink-500"></i>
            <span class="font-bold tracking-tight text-lg">@thaalam_openmic</span>
        </a>

        <div class="mt-12 text-[10px] text-slate-600 uppercase tracking-[0.4em] font-medium">
            &copy; 2026 Open Mic Night &bull; All Rights Reserved
        </div>
    </footer>

    <script>
        // Hide loader when page is fully loaded
        window.addEventListener('load', function() {
            const loader = document.getElementById('loader-wrapper');
            setTimeout(() => {
                loader.classList.add('loader-hidden');
            }, 1000);
        });
    </script>
</body>
</html>
